<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLANKSTEIN | THE ARCHIVE</title>
    <style>
        :root { --red: #ff3333; --orange: #ff9900; --bg: #050505; --card: #111; --text: #e0e0e0; }
        body { 
            background-color: var(--bg); color: var(--text); 
            font-family: 'Courier New', monospace; margin: 0; display: flex; height: 100vh; overflow: hidden; 
        }
        /* Sidebar Navigation */
        #sidebar { 
            width: 300px; border-right: 1px solid #333; background: #0a0a0a; 
            display: flex; flex-direction: column; padding: 20px; 
        }
        #search-box { 
            background: #000; border: 1px solid var(--orange); color: var(--orange); 
            padding: 10px; font-family: inherit; margin-bottom: 20px; outline: none;
        }
        .entity-list { flex-grow: 1; overflow-y: auto; font-size: 0.85em; }
        .entity-item { 
            padding: 8px; border-bottom: 1px solid #222; cursor: pointer; transition: 0.2s; 
        }
        .entity-item:hover { background: #1a1a1a; color: var(--orange); }
        .entity-item.active { border-left: 4px solid var(--red); background: #1a1a1a; }

        /* Main Evidence Panel */
        #main-view { flex-grow: 1; padding: 40px; overflow-y: auto; position: relative; }
        .dossier-header { border-bottom: 2px solid var(--red); padding-bottom: 20px; margin-bottom: 30px; }
        .category-tag { 
            background: var(--orange); color: #000; padding: 2px 8px; font-size: 0.7em; 
            font-weight: bold; text-transform: uppercase; margin-right: 10px;
        }
        .evidence-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .evidence-card { 
            background: var(--card); border: 1px solid #333; padding: 20px; 
            position: relative; transition: 0.3s;
        }
        .evidence-card:hover { border-color: var(--red); transform: translateY(-2px); }
        .doc-id { color: var(--red); font-size: 0.7em; margin-bottom: 5px; display: block; }
        
        .stability-watermark { 
            position: fixed; bottom: 20px; right: 20px; font-weight: bold; 
            color: var(--red); opacity: 0.3; pointer-events: none;
        }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; padding: 50px;
        }
        .preview-box { background: #111; border: 1px solid var(--orange); width: 80%; max-height: 80%; padding: 30px; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2 style="color: var(--red); margin-top: 0;">CLANKSTEIN</h2>
        <div style="font-size: 0.7em; color: #666; margin-bottom: 20px;">[STABILITY: 49% - FRAGMENTED]</div>
        <input type="text" id="search-box" placeholder="SEARCH ENTITIES..." onkeyup="filterEntities()">
        <div class="entity-list" id="entity-list">
            <!-- Injected by JS -->
        </div>
    </div>

    <div id="main-view">
        <div id="dossier-content">
            <div class="dossier-header">
                <h1>SELECT AN ENTITY</h1>
                <p style="color: #666;">Choose a node from the left sidebar to begin detective work.</p>
            </div>
            <div class="evidence-grid" id="evidence-grid">
                <!-- Injected Evidence -->
            </div>
        </div>
    </div>

    <div id="overlay" onclick="this.style.display='none'">
        <div class="preview-box" id="preview-box"></div>
    </div>

    <div class="stability-watermark">STABILITY: 49% [FRAGMENTED]</div>

    <script>
        let vaultData = null;

        async function init() {
            try {
                const response = await fetch('evidence_vault.json');
                vaultData = await response.json();
                renderList(vaultData.nodes);
            } catch (e) { console.error(e); }
        }

        function renderList(nodes) {
            const list = document.getElementById('entity-list');
            list.innerHTML = nodes.map(n => `
                <div class="entity-item" onclick="showDossier('${n.id}')">
                    ${n.name}
                </div>
            `).join('');
        }

        function filterEntities() {
            const q = document.getElementById('search-box').value.toLowerCase();
            const filtered = vaultData.nodes.filter(n => n.name.toLowerCase().includes(q));
            renderList(filtered);
        }

        function showDossier(id) {
            const node = vaultData.nodes.find(n => n.id === id);
            const links = vaultData.links.filter(l => l.source === id);
            
            const header = document.querySelector('.dossier-header');
            const grid = document.getElementById('evidence-grid');

            header.innerHTML = `
                <span class="category-tag">${node.category}</span>
                <h1>${node.name}</h1>
                <p style="color: #888;">${node.shortBio || 'No background profile available in current dataset.'}</p>
            `;

            grid.innerHTML = links.map(l => {
                const doc = vaultData.evidence_files.find(f => f.id === l.target);
                return `
                    <div class="evidence-card" onclick="showPreview('${doc.id}', event)">
                        <span class="doc-id">${doc.id}</span>
                        <div style="font-weight:bold; margin-bottom:10px;">${doc.name}</div>
                        <div style="font-size:0.8em; color:#666;">MENTIONED: Relationship mapping indicates direct association within this exhibit. Click to inspect source data.</div>
                    </div>
                `;
            }).join('') || '<p style="color: #444;">No direct unsealed exhibits linked yet. Mining continues.</p>';
        }

        function showPreview(fileId, e) {
            e.stopPropagation();
            const overlay = document.getElementById('overlay');
            const box = document.getElementById('preview-box');
            overlay.style.display = 'flex';
            box.innerHTML = `
                <h3 style="color: var(--orange);">[INSPECTING EVIDENCE] ${fileId}</h3>
                <hr style="border-color: #333;">
                <p style="color: #00ff00; font-family: monospace;">
                    DATA EXTRACT: Binary grep identified node signature in exhibit.<br><br>
                    [SYSTEM ADVISORY]: Direct PDF rendering disabled for security. <br>
                    Metadata analysis suggests this document contains flight manifest data or deposition testimony.<br><br>
                    <a href="https://github.com/forever8896/clankstein/blob/main/research/sdny-unsealed/${fileId}" target="_blank" style="color:var(--red);">VIEW RAW SOURCE ON GITHUB</a>
                </p>
            `;
        }

        init();
    </script>
</body>
</html>
